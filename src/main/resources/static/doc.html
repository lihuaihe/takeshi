<!DOCTYPE html>
<html lang="zh-CN" xmlns="http://www.w3.org/1999/html">
<head>
    <title></title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1, user-scalable=yes">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/rapidoc/dist/rapidoc-min.js"></script>
    <script>
        const prefixUrl = 'v3/api-docs/';
        // fetch请求会缓存，修改 rdoc-project.md 文件后有时需要强制刷新才会显示修改后的内容
        // 如果禁用了springdoc.swagger-ui.enabled，则接口/swagger-config请求不通
        const configPromise = fetch(prefixUrl + 'swagger-config').then(res => res.json());
        const mdPromise = fetch('rdoc-project.md').then(res => {
            if (res.ok) {
                return res.text();
            }
        });
        window.addEventListener('DOMContentLoaded', (e) => {
            const versionSelectorEl = document.getElementById('version-selector');
            let overviewEl = document.getElementById('overview');
            const rdocEl = document.querySelector('rapi-doc');
            rdocEl.addEventListener('before-render', (e) => {
                document.title = e.detail.spec.info.title;
                rdocEl.setAttribute('nav-active-item-marker', 'colored-block')
            });
            rdocEl.addEventListener('spec-loaded', (e) => {
                addBt();
                rdocEl.shadowRoot.querySelectorAll('[part~="section-navbar-path"]')
                    .forEach(el => {
                        el.addEventListener('click', (e) => {
                            if (rdocEl.shadowRoot.querySelector('api-request').shadowRoot.querySelector('[part~=btn-last-params]')) {
                                rdocEl.shadowRoot.querySelector('api-request').shadowRoot.querySelector('[part~=btn-last-params]').remove();
                            }
                            addBt();
                        })
                    });
            })
            rdocEl.addEventListener('before-try', (e) => {
                const {request} = e.detail;
                request.headers.append('timestamp', Date.now().toString());
                request.headers.append('timezone', Intl.DateTimeFormat().resolvedOptions().timeZone);
                let param = {};
                const path = e.composedPath(); // 包括 Shadow DOM 内部路径
                const requestPanelInputEls = [...path[0].shadowRoot.firstElementChild.querySelectorAll('input, textarea:not(.is-hidden)')];
                requestPanelInputEls.forEach(el => {
                    if (el.tagName === 'INPUT') {
                        param.input = param.input || {};
                        param.input[el.dataset.pname] = el.value;
                    } else if (el.tagName === 'TEXTAREA') {
                        param['body'] = el.value;
                    }
                });
                if (Object.keys(param).length) {
                    localStorage.setItem(window.location.hash.slice(1), JSON.stringify(param));
                }
            });

            function addBt() {
                addRequestLastParamsBt();
                addChangResponseStyleBt();
            }

            async function addRequestLastParamsBt() {
                const startTime = Date.now();
                let apiRequestEl;
                while (!apiRequestEl) {
                    apiRequestEl = rdocEl.shadowRoot.querySelector('api-request');
                    if (Date.now() - startTime > 2000) {
                        return;
                    }
                    await new Promise(resolve => setTimeout(resolve, 100));
                    if (apiRequestEl && apiRequestEl.shadowRoot && apiRequestEl.shadowRoot.querySelector('[part=wrap-request-btn]')) {
                        let shadowRoot = apiRequestEl.shadowRoot;
                        const requestPanelInputEls = [...shadowRoot.firstElementChild.querySelectorAll('input, textarea:not(.is-hidden)')];
                        if (requestPanelInputEls.length) {
                            if (!shadowRoot.querySelector('[part~=btn-last-params]')) {
                                let wrapRequestBtnEL = shadowRoot.querySelector('[part=wrap-request-btn]');
                                let bt = document.createElement('button');
                                bt.classList.add('m-btn', 'thin-border');
                                bt.part.add('btn', 'btn-outline', 'btn-last-params');
                                bt.textContent = 'LAST PARAMS'
                                bt.title = 'Use the parameters of the last request';
                                bt.style.marginRight = '5px';
                                wrapRequestBtnEL.insertBefore(bt, wrapRequestBtnEL.children[1]);
                                bt.addEventListener('click', (e) => {
                                    let param = JSON.parse(localStorage.getItem(window.location.hash.slice(1)));
                                    if (param) {
                                        requestPanelInputEls.forEach(el => {
                                            if (el.tagName === 'INPUT') {
                                                let inputParam = param.input;
                                                el.value = inputParam[el.dataset.pname];
                                            } else if (el.tagName === 'TEXTAREA') {
                                                el.value = param.body;
                                            }
                                        });
                                    }
                                });
                            }
                        }
                    }
                }
            }

            async function addChangResponseStyleBt() {
                const startTime = Date.now();
                let apiResponseEl;
                while (!apiResponseEl) {
                    apiResponseEl = rdocEl.shadowRoot.querySelector('api-response');
                    if (Date.now() - startTime > 2000) {
                        return;
                    }
                    if (apiResponseEl && apiResponseEl.shadowRoot && apiResponseEl.shadowRoot.querySelector('[part~=btn-selected-response-status]')) {
                        let shadowRoot = apiResponseEl.shadowRoot;
                        let responseBtEl = shadowRoot.getElementById('response-bt');
                        if (responseBtEl) {
                            responseBtEl.textContent = 'ROW';
                            responseBtEl.parentElement.nextElementSibling.style.display = 'block';
                            responseBtEl.parentElement.parentElement.lastElementChild.style.display = 'none';
                        } else {
                            let styleElement = document.createElement('style');
                            styleElement.textContent = `
                              #response-col .res-code-msg {
                                display: flex;
                                align-items: center;
                              }
                              #response-col .res-code-msg p:first-of-type {
                                margin-right: 10px;
                              }
                              #response-col .res-code-msg p {
                                margin-block-end: 0.5em;
                              }
                            `;
                            shadowRoot.appendChild(styleElement);
                            let resPanelEl = shadowRoot.firstElementChild;
                            let responseEl = resPanelEl.firstElementChild;
                            responseEl.style.display = 'flex';
                            responseEl.style.justifyContent = 'space-between';

                            let bt = document.createElement('button');
                            bt.id = 'response-bt';
                            bt.classList.add('m-btn', 'primary', 'thin-border');
                            bt.textContent = 'ROW'
                            responseEl.appendChild(bt);

                            let el = resPanelEl.lastElementChild;

                            let newDiv = document.createElement('div');
                            newDiv.style.display = 'none';
                            newDiv.id = 'response-col';
                            let codeArray = el.firstElementChild.children;
                            let msgArray = el.children;
                            for (let i = 0; i < codeArray.length; i++) {
                                let divEl = document.createElement('div');
                                divEl.classList.add('res-code-msg');
                                let p1 = document.createElement('p');
                                p1.textContent = codeArray[i].textContent;
                                divEl.appendChild(p1);
                                let p2 = document.createElement('p');
                                p2.textContent = msgArray[i + 1].firstElementChild.querySelector('p').textContent;
                                divEl.appendChild(p2);
                                newDiv.appendChild(divEl);
                            }
                            resPanelEl.appendChild(newDiv);

                            bt.addEventListener('click', (e) => {
                                if (e.target.textContent === 'ROW') {
                                    // 隐藏col的样式
                                    el.style.display = 'none';
                                    // 显示row的样式
                                    newDiv.style.display = 'block';
                                    e.target.textContent = 'COL';
                                } else {
                                    // 显示col的样式
                                    el.style.display = 'block';
                                    // 隐藏row的样式
                                    newDiv.style.display = 'none';
                                    e.target.textContent = 'ROW';
                                }
                            });
                        }
                    }
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
            }

            configPromise.then(config => {
                if (config) {
                    config.urls.forEach(res => {
                        let optionEl = document.createElement('option');
                        optionEl.value = res.name;
                        optionEl.textContent = res.name;
                        versionSelectorEl.appendChild(optionEl);
                    });
                    rdocEl.loadSpec(prefixUrl + versionSelectorEl.value);
                    versionSelectorEl.addEventListener('change', (event) => {
                        const selectedVersion = event.target.value;
                        rdocEl.setAttribute('spec-url', prefixUrl + selectedVersion);
                    });
                    versionSelectorEl.removeAttribute('hidden');
                }
            }).catch(e => console.log(e));
            mdPromise.then((md) => {
                if (md) {
                    overviewEl.innerHTML = marked.parse(md);
                    overviewEl.removeAttribute('hidden');
                }
            }).catch(e => console.log(e));
        });
    </script>
    <style>
        #version-selector {
            width: 86%;
            margin: 10px auto 0 auto;
            padding: 5px;
            font-size: 16px;
            border-radius: 4px;
            -webkit-appearance: none; /* 清除浏览器默认样式 */
        }

        #overview {
            margin-top: 25px;
            border-top: 1px solid #ccc;
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>
<body>
<rapi-doc
        render-style="focused"
        show-header="false"
        schema-style="table"
        persist-auth="true"
        info-description-headings-in-navbar="true"
        show-method-in-nav-bar="as-colored-block"
        nav-item-spacing="relaxed"
        allow-server-selection="false"
        primary-color="#3B5998"
>
    <select slot="nav-logo" id="version-selector" hidden></select>
    <div slot="overview" id="overview" hidden></div>
</rapi-doc>
</body>
</html>
